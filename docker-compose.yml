name: legkaya-himiya

services:
  db:
    image: postgres:15-alpine
    container_name: himiya_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-himiya}
      POSTGRES_USER: ${POSTGRES_USER:-himiya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-himiya}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - himiya_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: himiya_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-himiya}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-himiya}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_HOURS: 24
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST:-smtp.spaceweb.ru}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      APP_URL: ${APP_URL:-https://xn----7sbihsakfp2g2ef.xn--p1ai}
      MEDIA_DIR: /media/videos
      MAX_VIDEO_SIZE_MB: ${MAX_VIDEO_SIZE_MB:-500}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://xn----7sbihsakfp2g2ef.xn--p1ai,https://www.xn----7sbihsakfp2g2ef.xn--p1ai}
    ports:
      - "127.0.0.1:8010:8000"
    volumes:
      - video_data:/media/videos
      - /media/docs:/media/docs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - himiya_net

volumes:
  postgres_data:
  video_data:

networks:
  himiya_net:
    driver: bridge
